<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" width="1200" height="360">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0e14"/>
      <stop offset="0.55" stop-color="#111726"/>
      <stop offset="1" stop-color="#1a0f12"/>
    </linearGradient>
    <linearGradient id="alert" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff4d4d"/>
      <stop offset="1" stop-color="#ffb020"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ff4d4d" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#ff4d4d" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="keyMetal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8b9199"/>
      <stop offset="0.5" stop-color="#e8ecef"/>
      <stop offset="1" stop-color="#5f6570"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1200" height="360" fill="url(#bg)"/>
  <circle cx="980" cy="90" r="260" fill="url(#glow)"/>

  <!-- circuitry lines suggesting software/security -->
  <g stroke="#2a3648" stroke-width="1.5" opacity="0.5" fill="none">
    <path d="M60 40 L60 120 L140 120 L140 200"/>
    <path d="M110 40 L110 80 L220 80"/>
    <path d="M60 320 L60 260 L180 260 L180 200"/>
    <path d="M1140 60 L1060 60 L1060 140"/>
    <path d="M1140 300 L980 300 L980 240"/>
    <circle cx="140" cy="200" r="4" fill="#2a3648"/>
    <circle cx="220" cy="80" r="4" fill="#2a3648"/>
    <circle cx="180" cy="200" r="4" fill="#2a3648"/>
    <circle cx="1060" cy="140" r="4" fill="#2a3648"/>
    <circle cx="980" cy="240" r="4" fill="#2a3648"/>
  </g>

  <!-- ledger grid faint -->
  <g stroke="#233043" stroke-width="1" opacity="0.35">
    <line x1="0" y1="60" x2="1200" y2="60"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="180" x2="1200" y2="180"/>
  </g>

  <!-- top alert bar -->
  <rect x="0" y="0" width="1200" height="6" fill="url(#alert)"/>

  <!-- broken lock / key motif, right side -->
  <g transform="translate(930,150)">
    <circle cx="0" cy="0" r="150" fill="none" stroke="#ff4d4d" stroke-width="1" opacity="0.25"/>
    <!-- key shape -->
    <g transform="rotate(-18)">
      <circle cx="-40" cy="0" r="34" fill="none" stroke="url(#keyMetal)" stroke-width="12"/>
      <rect x="-8" y="-7" width="100" height="14" fill="url(#keyMetal)"/>
      <rect x="60" y="7" width="14" height="20" fill="url(#keyMetal)"/>
      <rect x="80" y="7" width="14" height="26" fill="url(#keyMetal)"/>
    </g>
    <!-- crack line through key -->
    <path d="M-90 -40 L-30 10 L-55 30 L10 70 L-10 20 L20 5 L-40 -55 Z" fill="#0a0e14" opacity="0.85"/>
    <line x1="-95" y1="-45" x2="35" y2="85" stroke="#ff4d4d" stroke-width="3" opacity="0.9"/>
    <line x1="-95" y1="-45" x2="35" y2="85" stroke="#ffb020" stroke-width="1" opacity="0.8"/>
  </g>

  <!-- warning triangle small accent -->
  <g transform="translate(80,255)" opacity="0.9">
    <polygon points="0,-22 22,18 -22,18" fill="none" stroke="#ffb020" stroke-width="3"/>
    <line x1="0" y1="-6" x2="0" y2="6" stroke="#ffb020" stroke-width="3"/>
    <circle cx="0" cy="12" r="1.6" fill="#ffb020"/>
  </g>

  <text x="60" y="150" font-family="'Segoe UI', Arial, sans-serif" font-weight="700" font-size="62" fill="#f4f6f8">
    <tspan x="60" y="140" textLength="820" lengthAdjust="spacingAndGlyphs">BankTree Full Access</tspan>
    <tspan x="60" y="212" textLength="500" lengthAdjust="spacingAndGlyphs">+ Product Key</tspan>
  </text>

  <text x="60" y="268" font-family="'Segoe UI', Arial, sans-serif" font-size="21" fill="#c7cdd6">
    <tspan x="60" y="268" textLength="1080.0" lengthAdjust="spacingAndGlyphs" font-size="15.8">I can't help create a description for this tool, as it appears to be a license patch/crack designed to bypass…</tspan>
  </text>

  <rect x="60" y="296" width="90" height="4" fill="url(#alert)"/>
</svg>